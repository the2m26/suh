<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>suh user app</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --glass-fill: rgba(255,255,255,0.14);
    --glass-fill-dark: rgba(30,30,35,0.30);
    --glass-border: rgba(255,255,255,0.35);
    --glass-border-soft: rgba(255,255,255,0.18);
    --text-primary: #ffffff;
    --text-secondary: rgba(255,255,255,0.62);
    --accent-orange: #FF9F45;
    --accent-yellow: #FFC94A;
    --accent-teal: #3FCFB4;
    --accent-blue: #6FB6FF;
    --tile-radius: 10px;
    --nav-radius: 34px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    background:
      radial-gradient(140% 90% at 50% 0%, rgba(120,150,210,0.9) 0%, rgba(150,140,190,0.55) 32%, transparent 62%),
      linear-gradient(180deg, #6f8fbd 0%, #9b8fb0 22%, #cf9f80 48%, #e2a35c 66%, #c97f3f 84%, #8a5a35 100%);
    color: var(--text-primary);
    position: relative;
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    background: radial-gradient(circle at 78% 8%, rgba(255,225,180,0.55), transparent 38%);
    pointer-events: none;
    z-index: 0;
  }

  .app-shell {
    position: relative; z-index: 1;
    max-width: 560px; margin: 0 auto;
    padding: 0 10px 110px;
    min-height: 100vh;
  }

  /* ---------- PULL-TO-REFRESH (PWA/Add to Home Screen горимд браузерын refresh
     байдаггүй тул, гараар хийсэн жижиг индикатор) ---------- */
  #pullRefreshIndicator {
    position: fixed; left: 0; right: 0; top: 0; z-index: 60;
    display: flex; align-items: center; justify-content: center;
    height: 0; overflow: hidden;
    transition: height .15s ease-out;
    pointer-events: none;
  }
  #pullRefreshIndicator .spin {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2.5px solid rgba(255,255,255,0.28); border-top-color: #fff;
    transition: transform .05s linear;
  }
  #pullRefreshIndicator.loading .spin { animation: pr-spin .7s linear infinite; }
  @keyframes pr-spin { to { transform: rotate(360deg); } }

  .home-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 32px 6px 18px;
  }
  .home-header h1 {
    margin: 0; font-size: 26px; font-weight: 600; letter-spacing: -0.02em;
    text-shadow: 0 1px 12px rgba(0,0,0,0.15);
  }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--glass-fill);
    border: 1px solid var(--glass-border-soft);
    backdrop-filter: blur(20px) saturate(1.3);
    -webkit-backdrop-filter: blur(20px) saturate(1.3);
    display: flex; align-items: center; justify-content: center;
    color: #fff; cursor: pointer; transition: transform .15s ease, background .15s ease;
  }
  .icon-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.22); }
  .icon-btn { position: relative; }
  .inbox-badge {
    position: absolute; top: -2px; right: -2px; min-width: 16px; height: 16px;
    padding: 0 4px; border-radius: 8px; background: #ef4444; color: #fff;
    font-size: 10px; font-weight: 700; display: none; align-items: center; justify-content: center;
    line-height: 1; border: 1.5px solid rgba(0,0,0,0.15);
  }
  .inbox-badge.show { display: flex; }
  .mini-toast {
    position: fixed; left: 50%; bottom: 90px; transform: translateX(-50%) translateY(20px);
    background: rgba(20,20,24,0.92); color: #fff; padding: 11px 18px; border-radius: 14px;
    font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity .25s ease, transform .25s ease;
    backdrop-filter: blur(12px); max-width: 82vw; text-align: center; pointer-events: none;
  }
  .mini-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- Tile grid (дата-төвтэй, JS-ээр угсарна) ---------- */
  .tile-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-auto-flow: row dense;
    gap: 10px;
  }

  .tile {
    position: relative;
    border-radius: var(--tile-radius);
    background: var(--glass-fill);
    border: 1px solid var(--glass-border-soft);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.25),
      inset 0 -1px 12px rgba(255,255,255,0.03),
      0 8px 24px rgba(0,0,0,0.12);
    overflow: visible;
    cursor: pointer;
    transition: transform .18s cubic-bezier(.2,.8,.3,1), background .18s ease;
  }
  .tile:active { transform: scale(0.965); }
  .tile.dim { background: var(--glass-fill-dark); }

  .tile-big {
    grid-row: span 2;
    padding: 18px;
    display: flex; flex-direction: column; justify-content: space-between;
    min-height: 172px;
  }
  .tile-big .tile-icon-badge {
    width: 46px; height: 46px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .tile-big .tile-metric { font-size: 40px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
  .tile-big .tile-label { font-size: 13px; font-weight: 700; margin-top: 2px; }
  .tile-big .tile-status { font-size: 13px; color: var(--text-secondary); font-weight: 500; margin-top: 1px; }

  .tile-small {
    padding: 13px 14px;
    display: flex; align-items: center; gap: 11px;
    min-height: 86px;
    grid-column: span 2;
  }
  .tile-small .tile-icon-badge {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .tile-small .tile-text { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .tile-small .tile-label { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tile-small .tile-status { font-size: 12.5px; color: var(--text-secondary); font-weight: 500; }

  .badge-teal   { background: linear-gradient(160deg,#4be0c4,#26a68c); color: #06332b; }
  .badge-yellow { background: linear-gradient(160deg,#ffd873,#ffb238); color: #4a3300; }
  .badge-gray   { background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.55); }
  .badge-fan    { background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.75); }

  .metric-orange { color: var(--accent-orange); }
  .metric-blue   { color: var(--accent-blue); }

  /* ---------- EDIT MODE — улаан хасах badge (iPhone маягийн), чичрэлт үгүй ---------- */
  .tile-grid.edit-mode .tile { cursor: grab; user-select: none; -webkit-user-select: none; }
  .tile-grid.edit-mode .tile.dragging { touch-action: none; }
  .tile-grid.edit-mode .tile.dragging { opacity: 0.55; z-index: 10; cursor: grabbing; box-shadow: 0 16px 32px rgba(0,0,0,0.35); }

  .delete-badge {
    position: absolute; top: -7px; right: -7px;
    width: 24px; height: 24px; border-radius: 50%;
    background: #eb4444;
    border: 2px solid rgba(255,255,255,0.9);
    display: none;
    align-items: center; justify-content: center;
    z-index: 5;
    box-shadow: 0 2px 6px rgba(0,0,0,0.35);
    cursor: pointer;
  }
  .tile-grid.edit-mode .delete-badge { display: flex; }
  .delete-badge svg { width: 12px; height: 12px; }

  .edit-done-bar {
    display: none;
    justify-content: center;
    margin: 4px 0 14px;
  }
  .edit-done-bar.show { display: flex; }
  .edit-done-btn {
    padding: 9px 26px; border-radius: 20px;
    background: var(--accent-orange); color: #2b1400;
    font-weight: 700; font-size: 14px; border: none; cursor: pointer;
  }

  /* ---------- "+" Нэмэх modal (Pool сонголт) ---------- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(10,10,15,0.55);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 50;
  }
  .modal-overlay.open { display: flex; }
  .add-modal {
    width: 100%; max-width: 560px;
    background: rgba(35,32,42,0.86);
    backdrop-filter: blur(30px) saturate(1.4);
    -webkit-backdrop-filter: blur(30px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.14);
    border-top-left-radius: 26px; border-top-right-radius: 26px;
    padding: 18px 16px calc(20px + env(safe-area-inset-bottom));
    max-height: 72vh; overflow-y: auto;
  }
  .add-modal h3 { margin: 0 0 14px; font-size: 16px; }

  /* ---------- LOGIN OVERLAY ---------- */
  .login-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(140% 90% at 50% 0%, rgba(120,150,210,0.9) 0%, rgba(150,140,190,0.55) 32%, transparent 62%),
      linear-gradient(180deg, #6f8fbd 0%, #9b8fb0 22%, #cf9f80 48%, #e2a35c 66%, #c97f3f 84%, #8a5a35 100%);
    padding: 20px;
  }
  .login-card {
    width: 100%; max-width: 340px;
    background: var(--glass-fill-dark);
    backdrop-filter: blur(30px) saturate(1.4);
    -webkit-backdrop-filter: blur(30px) saturate(1.4);
    border: 1px solid var(--glass-border-soft);
    border-radius: 20px;
    padding: 28px 22px;
  }
  .login-card h1 { margin: 0 0 4px; font-size: 22px; font-weight: 700; }
  .login-card p { margin: 0 0 20px; font-size: 13px; color: var(--text-secondary); }
  .login-field { margin-bottom: 12px; }
  .login-field label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
  .login-field input {
    width: 100%; padding: 12px 14px; border-radius: 12px;
    background: rgba(255,255,255,0.10); border: 1px solid var(--glass-border-soft);
    color: #fff; font-size: 15px; outline: none; box-sizing: border-box;
  }
  .login-field input::placeholder { color: rgba(255,255,255,0.4); }
  .login-btn {
    width: 100%; padding: 13px; border-radius: 12px; margin-top: 6px;
    background: rgba(255,255,255,0.92); color: #2a2a30;
    border: none; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .login-btn:active { transform: scale(0.98); }
  .login-error {
    font-size: 12.5px; color: #FF8A8A; margin-top: 10px; min-height: 16px;
  }

  /* ---------- INBOX PANEL ---------- */
  .inbox-item {
    padding: 12px 6px; border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .inbox-item .inbox-cat {
    display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: .04em;
    padding: 2px 8px; border-radius: 20px; background: rgba(255,255,255,0.14); margin-bottom: 6px;
  }
  .inbox-item .inbox-title { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
  .inbox-item .inbox-content { font-size: 12.5px; color: var(--text-secondary); line-height: 1.5; }
  .inbox-item .inbox-date { font-size: 10.5px; color: var(--text-secondary); margin-top: 6px; }

  /* ---------- CONTENT PAGE (2-р загварын модулиуд) ---------- */
  .content-page {
    position: fixed; inset: 0; z-index: 80;
    display: none; flex-direction: column;
    background:
      radial-gradient(140% 90% at 50% 0%, rgba(120,150,210,0.9) 0%, rgba(150,140,190,0.55) 32%, transparent 62%),
      linear-gradient(180deg, #6f8fbd 0%, #9b8fb0 22%, #cf9f80 48%, #e2a35c 66%, #c97f3f 84%, #8a5a35 100%);
  }
  .content-page.open { display: flex; }
  .content-header {
    display: flex; align-items: center; gap: 12px;
    padding: calc(18px + env(safe-area-inset-top)) 16px 14px;
    flex-shrink: 0;
  }
  .content-title { font-size: 18px; font-weight: 700; }
  .content-body {
    flex: 1; overflow-y: auto; padding: 4px 14px calc(24px + env(safe-area-inset-bottom));
  }
  .mobile-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .mobile-stat-card {
    background: var(--glass-fill); border: 1px solid var(--glass-border-soft);
    border-radius: 14px; padding: 16px 14px; backdrop-filter: blur(20px);
  }
  .mobile-stat-value { font-size: 22px; font-weight: 800; }
  .mobile-stat-label { font-size: 11.5px; color: var(--text-secondary); margin-top: 4px; }
  .mobile-list-item {
    background: var(--glass-fill); border: 1px solid var(--glass-border-soft);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; backdrop-filter: blur(20px);
    cursor: pointer;
  }
  .mobile-list-title { font-size: 14.5px; font-weight: 700; }
  .mobile-list-sub { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
  .mobile-vote-options { display: flex; flex-direction: column; gap: 8px; }
  .mobile-vote-btn {
    text-align: left; padding: 12px 14px; border-radius: 12px;
    background: rgba(255,255,255,0.08); border: 1.5px solid var(--glass-border-soft);
    color: #fff; font-size: 13.5px; cursor: pointer;
  }
  .mobile-vote-btn.selected { border-color: var(--accent-teal); background: rgba(63,207,180,0.22); }
  .pool-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 6px; border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .pool-item .tile-icon-badge { width: 34px; height: 34px; border-radius: 50%; display:flex;align-items:center;justify-content:center; flex-shrink:0; }
  .pool-item .pool-label { flex: 1; font-size: 14px; font-weight: 600; }
  .pool-add-btn {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent-teal); border: none; color: #06332b;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .pool-empty { text-align: center; color: var(--text-secondary); padding: 20px 0; font-size: 13px; }

  /* ---------- Доод navigation ---------- */
  .tab-bar-wrap {
    position: fixed; left: 0; right: 0; bottom: 0;
    display: flex; justify-content: center;
    padding: 0 16px calc(14px + env(safe-area-inset-bottom));
    z-index: 20;
    pointer-events: none;
  }
  .tab-bar {
    pointer-events: auto;
    position: relative;
    display: flex;
    width: 100%; max-width: 448px;
    padding: 6px;
    border-radius: var(--nav-radius);
    background: rgba(40,35,45,0.42);
    border: 1px solid rgba(255,255,255,0.16);
    backdrop-filter: blur(28px) saturate(1.5);
    -webkit-backdrop-filter: blur(28px) saturate(1.5);
    box-shadow: 0 12px 32px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .tab-indicator {
    position: absolute; top: 6px; bottom: 6px; left: 6px;
    width: calc((100% - 12px) / 3);
    border-radius: calc(var(--nav-radius) - 6px);
    background: rgba(255,255,255,0.16);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 2px 10px rgba(0,0,0,0.15);
    transition: transform .38s cubic-bezier(.22,1,.36,1);
    z-index: 0;
  }
  .tab-btn {
    position: relative; z-index: 1;
    flex: 1;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 9px 4px 8px;
    background: none; border: none;
    color: rgba(255,255,255,0.55);
    font-size: 10.5px; font-weight: 600;
    cursor: pointer;
    transition: color .25s ease;
  }
  .tab-btn svg { width: 23px; height: 23px; transition: transform .25s cubic-bezier(.2,.9,.3,1.3); }
  .tab-btn.active { color: var(--accent-orange); }
  .tab-btn.active svg { transform: translateY(-1px) scale(1.04); }
  .tab-btn:active svg { transform: scale(0.88); }

  @media (min-width: 540px) {
    .app-shell { padding-top: 8px; }
  }
</style>
</head>
<body>

<!-- Нэвтрэх дэлгэц -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <h1>СӨХ</h1>
    <p>Хэрэглэгчийн эрхээрээ нэвтэрнэ үү</p>
    <div class="login-field">
      <label>И-мэйл</label>
      <input type="email" id="login-email" placeholder="tanii@mail.mn" autocomplete="username">
    </div>
    <div class="login-field">
      <label>Нууц үг</label>
      <div style="position:relative">
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" style="padding-right:44px" onkeydown="if(event.key==='Enter')doUserLogin()">
        <button type="button" onclick="toggleLoginPasswordVisibility()" aria-label="Нууц үг харуулах/нуух"
          style="position:absolute;right:4px;top:50%;transform:translateY(-50%);width:34px;height:34px;border:none;background:transparent;color:rgba(255,255,255,0.55);cursor:pointer;display:flex;align-items:center;justify-content:center">
          <svg id="login-eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-secondary);margin-bottom:16px;cursor:pointer">
      <input type="checkbox" id="login-remember" checked style="width:auto">Намайг сана
    </label>
    <button class="login-btn" onclick="doUserLogin()">Нэвтрэх</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div class="app-shell">

  <div id="pullRefreshIndicator"><div class="spin"></div></div>

  <!-- Толгой -->
  <div class="home-header">
    <div>
      <h1>СӨХ</h1>
      <div id="userGreeting" style="font-size:12px;color:var(--text-secondary);margin-top:2px"></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" aria-label="Нэхэмжлэх, мэдэгдэл, зарын inbox" onclick="openInbox()">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
        <span class="inbox-badge" id="inboxBadge">0</span>
      </button>
      <button class="icon-btn" aria-label="Нуусан товчоо сэргээх" onclick="openAddModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button class="icon-btn" aria-label="Гарах" onclick="doUserLogout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div class="edit-done-bar" id="editDoneBar">
    <button class="edit-done-btn" onclick="exitEditMode()">Дуусгах</button>
  </div>

  <!-- Дата-төвтэй, JS-ээр угсардаг tile grid -->
  <div class="tile-grid" id="tileGrid"></div>

</div>

<!-- Inbox modal -->
<div class="modal-overlay" id="inboxOverlay" onclick="if(event.target===this) closeInbox()">
  <div class="add-modal">
    <h3>Миний мэдэгдэл</h3>
    <div id="inboxList"></div>
  </div>
</div>

<!-- #3 QPay modal (2026-07-19 scaffold) -->
<div class="modal-overlay" id="qpayOverlay" onclick="if(event.target===this) closeQpayModal()">
  <div class="add-modal">
    <h3>QPay-аар төлөх</h3>
    <div id="qpayBody" style="text-align:center;padding:10px 0"></div>
  </div>
</div>

<!-- "Нуусан товчоо сэргээх" modal -->
<div class="modal-overlay" id="addModalOverlay" onclick="if(event.target===this) closeAddModal()">
  <div class="add-modal">
    <h3>Нуусан товчоо сэргээх</h3>
    <div id="poolList"></div>
  </div>
</div>

<!-- 2-р загварын модулиуд (Хянах самбар, Сууц өмчлөгч, Төлбөр, Тоот г.м.) -->
<div class="content-page" id="contentPage">
  <div class="content-header">
    <button class="icon-btn" aria-label="Буцах" onclick="closeContentPage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="content-title" id="contentTitle"></div>
  </div>
  <div class="content-body" id="contentBody"></div>
</div>

<!-- Доод Glass navigation -->
<div class="tab-bar-wrap">
  <nav class="tab-bar" id="tabBar">
    <div class="tab-indicator" id="tabIndicator"></div>

// ============================================================

// хуудас дахин нээгдэхэд хэрэглэгчийн сонголтыг сэргээнэ.

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ active: ACTIVE_TILES, pool: TILE_POOL }));
  } catch (e) { console.warn('Хадгалахад алдаа:', e); }
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (data && Array.isArray(data.active) && Array.isArray(data.pool)) {
      ACTIVE_TILES = data.active;
      TILE_POOL = data.pool;
      return true;
    }
  } catch (e) { console.warn('Ачаалахад алдаа:', e); }
  return false;
}

// ============================================================
// RENDER — ACTIVE_TILES массиваас бүх tile-г дахин угсарна
// ============================================================
function renderTiles() {
  const grid = document.getElementById('tileGrid');
  grid.className = 'tile-grid' + (editMode ? ' edit-mode' : '');
  grid.innerHTML = ACTIVE_TILES.map((t, idx) => {
    const sizeClass = t.size === 'big' ? 'tile-big' : 'tile-small';
    let inner;
    if (t.type === 'metric') {
      inner = `
        <div><div class="tile-metric ${t.metricClass}">${t.metric}</div></div>
        <div><div class="tile-label">${t.label}</div><div class="tile-status">${t.status}</div></div>`;
    } else if (t.type === 'lock') {
      const isLocked = t.status === 'Locked';
      inner = `
        <div class="tile-icon-badge ${isLocked ? 'badge-gray' : 'badge-teal'}">${isLocked ? ICON_LOCK_CLOSED : ICON_LOCK_OPEN}</div>
        <div><div class="tile-label">${t.label}</div><div class="tile-status">${t.status}</div></div>`;
    } else if (t.type === 'fan') {
      const isOn = /On/i.test(t.status);
      inner = `
        <div class="tile-icon-badge ${isOn ? 'badge-yellow' : 'badge-fan'}">${ICON_FAN}</div>
        <div class="tile-text"><div class="tile-label">${t.label}</div><div class="tile-status">${t.status}</div></div>`;
    }
    return `<div class="tile ${sizeClass}"
        data-idx="${idx}" data-tile-id="${t.id}"
        onclick="onTileClick(event, ${idx})"
        onpointerdown="onTilePointerDown(event, ${idx})">
      <span class="delete-badge" onclick="event.stopPropagation(); removeTile(${idx})">${ICON_DELETE_MINUS}</span>
      ${inner}
    </div>`;
  }).join('');
}

// ============================================================
// ТОВЧ ДАРАХ — Edit mode үед л Устгах; үгүй бол ӨӨРИЙНХӨӨ badge-г

// ============================================================
function onTileClick(evt, idx) {
  if (editMode) return;
  const t = ACTIVE_TILES[idx];
  if (t.page) { openModulePage(t.page); return; }
  if (t.type === 'lock') {
    t.status = (t.status === 'Locked') ? 'Unlocked' : 'Locked';
    renderTiles();
    saveState();
  } else if (t.type === 'fan') {
    t.status = /On/i.test(t.status) ? 'Off' : 'On';
    renderTiles();
    saveState();
  }
}

// ============================================================
// LONG-PRESS → Edit mode. Pointer Events ашигласнаар touch, mouse
// хоёуланд ЗӨВ ажиллана (native HTML5 draggable нь мобайл дээр
// текст сонгогдоод, чирэгдэхгүй байх бодит алдаатай байсан).
// ============================================================
let pressTimer = null;
const LONG_PRESS_MS = 550;
let pointerStartPos = null;

const DRAG_COMMIT_MS = 130;   // энэ хугацаанд бараг хөдөлгөөнгүй байвал л ЧИРЭХ гэж үзнэ
const DRAG_COMMIT_PX = 6;     // энэ зайнаас илүү хурдан шудрахад СКРОЛЛ гэж үзээд цуцална

function onTilePointerDown(evt, idx) {
  if (evt.target.closest('.delete-badge')) return;

  if (editMode) {
    // Edit mode-д ЧИРЭХ vs СКРОЛЛ ялгах: түр хугацаанд бараг хөдөлгөөнгүй
    // байвал л drag эхэлнэ — хурдан шудрах (swipe) бол native скролл
    // хэвээрээ үргэлжилнэ (touch-action:none-г drag баталгаажсны дараа л тавина).
    const startX = evt.clientX, startY = evt.clientY;
    const targetEl = evt.currentTarget;
    let committed = false;

    const commitTimer = setTimeout(() => {
      committed = true;
      cleanup();
      startDrag2(targetEl, idx, startX, startY);
    }, DRAG_COMMIT_MS);

    const onMove = (e) => {
      if (committed) return;
      const dx = Math.abs(e.clientX - startX);
      const dy = Math.abs(e.clientY - startY);
      if (dx > DRAG_COMMIT_PX || dy > DRAG_COMMIT_PX) {
        clearTimeout(commitTimer);
        cleanup();
      }
    };
    const onUp = () => { clearTimeout(commitTimer); cleanup(); };
    function cleanup() {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
    }
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
    return;
  }

  pointerStartPos = { x: evt.clientX, y: evt.clientY };
  clearPressTimer();
  pressTimer = setTimeout(() => { enterEditMode(); }, LONG_PRESS_MS);

  const cancelOnMove = (e) => {
    const dx = Math.abs(e.clientX - pointerStartPos.x);
    const dy = Math.abs(e.clientY - pointerStartPos.y);
    if (dx > 8 || dy > 8) clearPressTimer();
  };
  const cancelOnUp = () => {
    clearPressTimer();
    document.removeEventListener('pointermove', cancelOnMove);
    document.removeEventListener('pointerup', cancelOnUp);
  };
  document.addEventListener('pointermove', cancelOnMove);
  document.addEventListener('pointerup', cancelOnUp);
}

function clearPressTimer() {
  if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
}

// ⚠️ 2026-07-19: Tile-ууд одоо ЭРХЭЭР тодорхойлогддог (хэрэглэгчийн дур зоргоороо
// нэмж/хасдаг зүйл БИШ) тул, урт дараад "Засах горим" (чирж эрэмбэлэх/устгах)
// орох боломжийг идэвхгүй болгов — "+" нэмэх товч байхгүй болсон тул, урьд нь
// зөвшөөрөгдсөн товчийг санамсаргүй устгачихвал ДАХИН НЭМЭХ АРГА байхгүй байсан
// (зөвхөн дараагийн удаа нэвтрэхэд л сэргэнэ) — үүнийг андуурал үүсгэхээс сэргийлж
// бүрмөсөн хаав.
// ⚠️ 2026-07-19: Tile-г "нуух" гэдэг нь ЗӨВХӨН ХУВИЙН ХАРАГДАЦЫН СОНГОЛТ —
// эрхийг (permission) огт хөндөхгүй, зүгээр л энэ төхөөрөмж дээрх дэлгэцнээс
// л нуудаг (localStorage-д хадгална). Тиймээс аюулгүй — толгой хэсгийн "+"
// товчоор ЯМАР ЧУГЛАН ч буцааж сэргээж болно (ADD FROM POOL БИШ, зөвхөн
// НУУСНАА сэргээх зорилготой).
const HIDDEN_TILES_KEY = 'suh_userapp_hidden_tiles_v1';
function getHiddenTileKeys() {
  try { return new Set(JSON.parse(localStorage.getItem(HIDDEN_TILES_KEY) || '[]')); }
  catch (e) { return new Set(); }
}
function saveHiddenTileKeys(set) {
  localStorage.setItem(HIDDEN_TILES_KEY, JSON.stringify([...set]));
}

function enterEditMode() {
  if (editMode) return;
  editMode = true;
  document.getElementById('editDoneBar').classList.add('show');
  renderTiles();
}
function exitEditMode() {
  editMode = false;
  document.getElementById('editDoneBar').classList.remove('show');
  renderTiles();
  saveState();
}

// ============================================================
// УСТГАХ (улаан badge) — ACTIVE-аас POOL руу шилжүүлнэ (буцаах боломжтой)
// ============================================================
// ============================================================
// НУУХ (улаан badge) — зөвхөн энэ төхөөрөмж дээрх ХУВИЙН ХАРАГДАЦ, эрхэд
// нөлөөгүй. localStorage-д хадгалагдана, "+" товчоор үргэлж буцааж болно.
// ============================================================
function removeTile(idx) {
  const [removed] = ACTIVE_TILES.splice(idx, 1);
  if (removed.page) {
    const hidden = getHiddenTileKeys();
    hidden.add(removed.page);
    saveHiddenTileKeys(hidden);
  }
  renderTiles();
}

// ============================================================
// ЧИРЖ ЭРЭМБЭЛЭХ — Pointer Events + FLIP animation (First-Last-
// Invert-Play): чирж яваа tile pointer-ийг дагана, бусад tile
// хуучин байрлалаасаа шинэ рүү SMOOTH шилжинэ (iPhone-той адил).
// ============================================================
let draggedIdx = null;
let draggedEl = null;
let dragOffsetX = 0, dragOffsetY = 0;
let dragNaturalRect = null;

function captureRects(exceptEl) {
  const rects = {};
  document.querySelectorAll('.tile').forEach(el => {
    if (el === exceptEl) return;
    rects[el.dataset.tileId] = el.getBoundingClientRect();
  });
  return rects;
}

function playFlip(firstRects, exceptEl) {
  document.querySelectorAll('.tile').forEach(el => {
    if (el === exceptEl) return;
    const first = firstRects[el.dataset.tileId];
    if (!first) return;
    const last = el.getBoundingClientRect();
    const dx = first.left - last.left;
    const dy = first.top - last.top;
    if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
      el.style.transition = 'none';
      el.style.transform = `translate(${dx}px, ${dy}px)`;
      requestAnimationFrame(() => {
        el.style.transition = 'transform 0.28s cubic-bezier(.2,.8,.3,1)';
        el.style.transform = '';
      });
    }
  });
}

function positionDraggedEl(clientX, clientY) {
  // Байгалийн (grid дотор эзэлдэг ёстой) байрлалаасаа хэр хазайсныг
  // transform-ээр илэрхийлнэ — position:fixed биш тул tile grid дотроо
  // хэвээрээ үлдэж, зөвхөн ДҮРС нь хулганыг дагана.
  const dx = (clientX - dragOffsetX) - dragNaturalRect.left;
  const dy = (clientY - dragOffsetY) - dragNaturalRect.top;
  draggedEl.style.transform = `translate(${dx}px, ${dy}px) scale(1.05)`;
}

function startDrag2(targetEl, idx, clientX, clientY) {
  draggedIdx = idx;
  draggedEl = targetEl;
  dragNaturalRect = draggedEl.getBoundingClientRect();
  dragOffsetX = clientX - dragNaturalRect.left;
  dragOffsetY = clientY - dragNaturalRect.top;

  draggedEl.classList.add('dragging'); // .dragging нь touch-action:none-г ЭНД л, чирэх баталгаажсны дараа л идэвхжүүлнэ
  draggedEl.style.transition = 'none';
  draggedEl.style.zIndex = '999';
  draggedEl.style.pointerEvents = 'none';
  positionDraggedEl(clientX, clientY);

  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragEndHandler);
  document.addEventListener('pointercancel', onDragEndHandler);
}

function onDragMove(evt) {
  if (draggedIdx === null || !draggedEl) return;
  positionDraggedEl(evt.clientX, evt.clientY);

  const elBelow = document.elementFromPoint(evt.clientX, evt.clientY);
  const tileBelow = elBelow ? elBelow.closest('.tile') : null;
  if (tileBelow && tileBelow !== draggedEl) {
    const overIdx = +tileBelow.dataset.idx;
    if (overIdx !== draggedIdx) {
      const firstRects = captureRects(draggedEl);
      const [moved] = ACTIVE_TILES.splice(draggedIdx, 1);
      ACTIVE_TILES.splice(overIdx, 0, moved);
      draggedIdx = overIdx;
      renderTiles();

      draggedEl = document.querySelector(`[data-tile-id="${moved.id}"]`);
      draggedEl.classList.add('dragging');
      draggedEl.style.transition = 'none';
      draggedEl.style.zIndex = '999';
      draggedEl.style.pointerEvents = 'none';
      dragNaturalRect = draggedEl.getBoundingClientRect(); // шинэ байгалийн байрлалыг дахин хэмжинэ
      positionDraggedEl(evt.clientX, evt.clientY);

      playFlip(firstRects, draggedEl);
    }
  }
}

function onDragEndHandler() {
  if (draggedEl) {
    const el = draggedEl;
    el.style.transition = 'transform 0.22s cubic-bezier(.2,.8,.3,1)';
    el.style.transform = '';
    el.style.zIndex = '';
    el.style.pointerEvents = '';
    setTimeout(() => { el.classList.remove('dragging'); el.style.transition = ''; }, 230);
  }
  draggedIdx = null;
  draggedEl = null;
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEndHandler);
  document.removeEventListener('pointercancel', onDragEndHandler);
  saveState();
}



// ============================================================
// INBOX — Надад хаяглагдсан мэдэгдлийг харуулна (notifications.recipients_snapshot

// ⚠️ Санамж: "Мэдэгдэл" модулийн Харах эрх (RLS) ЯГ Level=1 шаарддаг тул, хэрэв

// шаардлагатай бол suh.html → Хандах эрхийн тохиргоо-с "Мэдэгдэл" мөрийг тохируулна уу.

// #4 РЕАЛТАЙМ МЭДЭГДЭЛ (2026-07-19 нэмэв) — Supabase Realtime ашиглан,
// апп нээлттэй байх хугацаанд шинэ Мэдэгдэл ирмэгц шууд мэдэгдэнэ.
// ⚠️ ЧУХАЛ: Энэ бол зөвхөн апп НЭЭЛТТЭЙ үед ажиллах "live" мэдэгдэл (Realtime
// channel), апп ХААЛТТАЙ/дэвсгэрт байхад утсанд гарч ирэх жинхэнэ Push Notification
// БИШ — тэр нь Service Worker + VAPID key бүртгэл + тусад нь суулгах (PWA) шаардана,

// ============================================================
let _notifChannel = null;
let _lastSeenNotifAt = null; // localStorage-д хадгалагдана, badge тоолоход ашиглана

async function getMyNotifRef() {
  if (currentProfile.role === 'ot' && currentProfile.apt) {
    const { data } = await sb.from('residents').select('id').eq('apt', currentProfile.apt).maybeSingle();
    if (data) return { refType: 'resident', refId: data.id };
  } else if (currentUser.email) {
    const { data } = await sb.from('employees').select('id').eq('email', currentUser.email).maybeSingle();
    if (data) return { refType: 'employee', refId: data.id };
  }
  return { refType: null, refId: null };

async function updateInboxBadge() {
  const badge = document.getElementById('inboxBadge');
  if (!badge) return;
  const { refType, refId } = await getMyNotifRef();
  if (!refType) { badge.classList.remove('show'); return; }
  const { data: notifs, error } = await sb.from('notifications')
    .select('sent_at, recipients_snapshot')
    .gt('sent_at', _lastSeenNotifAt || '1970-01-01T00:00:00Z')
    .order('sent_at', { ascending: false })
    .limit(100);
  if (error) { console.error('inbox badge fetch error:', error.message); return; }
  const unread = (notifs || []).filter(n => (n.recipients_snapshot || []).some(r => r.ref_type === refType && r.ref_id === refId));
  if (unread.length > 0) {
    badge.textContent = unread.length > 9 ? '9+' : String(unread.length);
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

// Апп нээлттэй үед л ажиллах Realtime сонсогч — шинэ мэдэгдэл INSERT хийгдэх
// бүрд шалгаж, надад хамаатай бол mini-toast + badge шинэчилнэ.
async function subscribeToMyNotifications() {
  if (_notifChannel) return; // давхар бүртгэхээс сэргийлэх
  const { refType, refId } = await getMyNotifRef();
  if (!refType) return; // vw г.м. надтай холбоотой resident/employee мөр байхгүй бол дуусгана
  _notifChannel = sb.channel('userapp-notifications')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications' }, (payload) => {
      const row = payload.new;
      const myEntry = (row.recipients_snapshot || []).find(r => r.ref_type === refType && r.ref_id === refId);
      if (!myEntry) return;
      showMiniToast('🔔 ' + (myEntry.title || row.title || 'Шинэ мэдэгдэл ирлээ'));
      updateInboxBadge();
    })
    .subscribe();
}

async function openInbox() {
  document.getElementById('inboxOverlay').classList.add('open');
  const el = document.getElementById('inboxList');
  el.innerHTML = '<div class="pool-empty">Ачаалж байна...</div>';

  const { refType: myRefType, refId: myRefId } = await getMyNotifRef();

  const { data: notifs, error } = await sb.from('notifications').select('*').order('sent_at', { ascending: false }).limit(50);
  if (error) { el.innerHTML = '<div class="pool-empty">Мэдэгдэл ачаалахад алдаа гарлаа (эрхээ шалгана уу)</div>'; return; }

  // ⚠️ 2026-07-20: Хүлээн авагч бүр тухайлсан Гарчигтай байж болно (recipients_snapshot
  // доторх миний мөрөнд r.title) — тэрийг олж, байхгүй бол ерөнхий n.title-г ашиглана.
  const mine = (notifs || [])
    .map(n => {
      const myEntry = (n.recipients_snapshot || []).find(r => r.ref_type === myRefType && r.ref_id === myRefId);
      return myEntry ? { ...n, _myTitle: myEntry.title || n.title } : null;
    })
    .filter(Boolean);
  if (!mine.length) { el.innerHTML = '<div class="pool-empty">Танд ирсэн мэдэгдэл алга</div>'; return; }

  el.innerHTML = mine.map(n => `
    <div class="inbox-item">
      <span class="inbox-cat">${escUserHtml(NOTIF_CAT_LABELS_MN[n.category || n.type] || n.type || '—')}</span>
      <div class="inbox-title">${escUserHtml(n._myTitle)}</div>
      <div class="inbox-content">${escUserHtml(n.content)}</div>
      <div class="inbox-date">${escUserHtml(_fmtNotifFooter(n))}</div>
    </div>`).join('');
}
// 2026-07-20 нэмэв: "YYYY/MM/DD HH:MM:SS, СӨХ, [ажилтны нэр], [албан тушаал]" формат
function _fmtNotifFooter(n) {
  const d = n.sent_at ? new Date(n.sent_at) : null;
  let dateStr = n.date || '—';
  if (d && !isNaN(d.getTime())) {
    const y = d.getFullYear(), mo = String(d.getMonth() + 1).padStart(2, '0'), da = String(d.getDate()).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0'), mi = String(d.getMinutes()).padStart(2, '0'), ss = String(d.getSeconds()).padStart(2, '0');
    dateStr = `${y}/${mo}/${da} ${hh}:${mi}:${ss}`;
  }
  const parts = [dateStr, 'СӨХ'];
  if (n.sender_name) parts.push(n.sender_name);
  if (n.sender_position) parts.push(n.sender_position);
  return parts.join(', ');
}
function closeInbox() {
  document.getElementById('inboxOverlay').classList.remove('open');
  markNotifsSeenNow();
}

// өгөгдөл (suh.html-тэй ижил эх сурвалж) — нэвтэрсний дараа нэг удаа ачаална.
let feeSettings = { perSqm: 2500, utility: 15000, extra: 0, garage: 25000, storageSqm: 1500, pendingMonths: 1, overdueMonths: 2, riskMonths: 12 };
let rentSettings = { perSqm: 15000, garage: 25000, storageSqm: 1500, waste: 50000, extra: 0, pendingMonths: 1, overdueMonths: 2, riskMonths: 12 };
let APT_TYPES = [], PARKING_TYPES = [], STORAGE_TYPES = [];

async function loadReferenceData() {

// ---------- suh.html-тэй ЯГ ИЖИЛ томьёо (residents.js/finance.js/businesses.js-ээс) ----------
function getSqmByBuildingAndDoor(buildingId, doorNum) {
  const types = APT_TYPES.filter(t => t.building_id === buildingId);
  for (const t of types) {
    const doors = Array.isArray(t.door_numbers) ? t.door_numbers : [];
    if (doors.includes(doorNum)) return parseFloat(t.sqm) || 0;
  }
  // ⚠️ 2026-07-19: residents.js-ийн getSqmByBuildingAndDoor-той ЯГ ИЖИЛ fallback —
  // энэ логикийг өмнө нь орхигдуулсанаас, apt_types-д тохирохгүй тоотуудын
  // sqm=0 болж, "Энэ сард нэхэмжилсэн"/"Өр авлага" бага тоотой гарч байсан
  // зөрүүний шалтгаан байсан.
  if (buildingId >= 101 && buildingId <= 104) {
    return (doorNum === 3 || doorNum === 4) ? 49.95 : 55.04;
  } else if (buildingId >= 105 && buildingId <= 109) {
    return (doorNum === 1 || doorNum === 4) ? 117.67 : 117.83;
  } else if (buildingId >= 110 && buildingId <= 114) {
    return (doorNum === 1 || doorNum === 4) ? 95.71 : 95.86;
  } else if (buildingId >= 115 && buildingId <= 118) {
    return (doorNum === 1 || doorNum === 4) ? 69.92 : 79.98;
  }
  return 0;
}
function residentSqmU(r) { return getSqmByBuildingAndDoor(r.building, r.door); }
function calcFeeU(sqm) { return sqm * (feeSettings.perSqm || 0) + (feeSettings.utility || 0) + (feeSettings.extra || 0); }
function spotFullLabelU(floor, zone, num) { return [floor, zone, num].filter(Boolean).join('-'); }
function labelsMatchU(a, b) {
  if (a === b) return true;
  const ap = String(a).split('-'), bp = String(b).split('-');
  if (ap.length !== bp.length) return false;
  return ap.slice(0, -1).join('-').toLowerCase() === bp.slice(0, -1).join('-').toLowerCase() &&
    String(+ap[ap.length - 1]) === String(+bp[bp.length - 1]);
}
function getSpotSqmU(kind, fullLabel) {
  const arr = kind === 'storage' ? STORAGE_TYPES : PARKING_TYPES;
  const numField = kind === 'storage' ? 'unit_numbers' : 'spot_numbers';
  for (const t of arr) {
    for (const n of (t[numField] || [])) {
      if (labelsMatchU(spotFullLabelU(t.floor_label, t.zone_label, n), fullLabel)) return +t.sqm || 0;
    }
  }
  return 0;
}
function computeBizFeeU(b) {
  const garageFee = (b.parkings || []).length * (rentSettings.garage || 0);
  const storageFee = (b.storages || []).reduce((s, l) => s + getSpotSqmU('storage', l), 0) * (rentSettings.storageSqm || 0);
  const wasteFee = rentSettings.waste || 0;
  if (b.type === 'owner') return garageFee + storageFee + wasteFee;
  const areaFee = (+b.area || 0) * (rentSettings.perSqm || 0);
  return areaFee + garageFee + storageFee + wasteFee + (rentSettings.extra || 0);
}
function monthsBetweenU(d1, d2) {
  if (!d1 || !d2) return 0;
  const a = new Date(d1), b = new Date(d2);
  if (isNaN(a) || isNaN(b)) return 0;
  return Math.max(0, (b.getFullYear() - a.getFullYear()) * 12 + (b.getMonth() - a.getMonth()));
}

// 2-Р ЗАГВАР — "Хянах самбар, Сууц өмчлөгч, Төлбөрийн явц, Тоот/Зогсоол/
// Агуулах, Тайлан, Мэдэгдэл, Санал асуулга" — Supabase-аас шууд өгөгдөл татаж,
// userapp.html-ийн mobile CSS-ээр шинээр угсарна (suh.html руу шилждэггүй).
// ⚠️ Санамж: Энд өгсөн тоо/задаргаа нь suh.html-ийн нарийн тарифын томьёог
// (feeSettings, computeBizFee г.м.) БҮРЭН давхардуулаагүй, харин чухал
// үзүүлэлтүүдийг шууд, хялбар байдлаар харуулсан V1 хувилбар — тоо бага зэрэг
// ялгаатай гарч болзошгүй тул, нарийн тооцоолол хэрэгтэй бол desktop suh.html-ийг
// ашиглана уу.
// ============================================================
// ============================================================
// ГРАФИК ЗУРАХ ТУСЛАХ (жижиг, гадаад сангүй SVG) + ӨР АВЛАГЫН ТООЦООЛОЛ
// ============================================================
function sparklineSvg(values, color, width, height) {
  if (!values.length) return '';
  const max = Math.max(...values, 1), min = Math.min(...values, 0);
  const range = (max - min) || 1;
  const step = width / Math.max(values.length - 1, 1);
  const pts = values.map((v, i) => `${(i * step).toFixed(1)},${(height - ((v - min) / range) * height).toFixed(1)}`).join(' ');
  return `<svg width="100%" height="${height}" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" style="display:block">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}
function barChartSvg(incomeArr, expenseArr, labels, width, height) {
  const max = Math.max(...incomeArr, ...expenseArr, 1);
  const n = labels.length, gap = 3, groupW = width / n, barW = (groupW - gap * 3) / 2;
  let bars = '';
  for (let i = 0; i < n; i++) {
    const x0 = i * groupW + gap;
    const hI = (incomeArr[i] / max) * (height - 14), hE = (expenseArr[i] / max) * (height - 14);
    bars += `<rect x="${x0}" y="${height - hI}" width="${barW}" height="${hI}" rx="1.5" fill="var(--ok)"/>`;
    bars += `<rect x="${x0 + barW + gap}" y="${height - hE}" width="${barW}" height="${hE}" rx="1.5" fill="var(--danger)"/>`;
  }
  return `<svg width="100%" height="${height}" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" style="display:block">${bars}</svg>`;
}

// Сууц өмчлөгч/ААН-ы энэ жилийн өрийг suh.html-тэй ЯГ ИЖИЛ зарчмаар (Өмчилсөн/
// Гэрээ эхэлсэн огнооноос тоолж, 999-сентинел биш) тооцоолно.
function computeResidentDebtU(r, month, year, paidMonthsSet) {
  let startMonth = 1;
  const od = r.own_date ? new Date(r.own_date) : null;
  if (od && !isNaN(od)) {
    const oy = od.getFullYear(), om = od.getMonth() + 1;
    if (oy === year) startMonth = om; else if (oy > year) startMonth = month + 1;
  }
  let consecutivePaid = startMonth - 1;
  for (let m = startMonth; m <= month; m++) { if (paidMonthsSet.has(m)) consecutivePaid = m; else break; }
  const monthsUnpaid = Math.max(0, month - consecutivePaid);
  return monthsUnpaid * calcFeeU(residentSqmU(r));
}
function computeBusinessDebtU(b, month, year, paidMonthsSet) {
  const fee = computeBizFeeU(b);
  if (!(fee > 0)) return 0;
  let startMonth = 1;
  const sd = b.contract_start ? new Date(b.contract_start) : null;
  if (sd && !isNaN(sd)) {
    const sy = sd.getFullYear(), sm = sd.getMonth() + 1;
    if (sy === year) startMonth = sm; else if (sy > year) startMonth = month + 1;
  }
  let consecutivePaid = startMonth - 1;
  for (let m = startMonth; m <= month; m++) { if (paidMonthsSet.has(m)) consecutivePaid = m; else break; }
  const monthsUnpaid = Math.max(0, month - consecutivePaid);
  return monthsUnpaid * fee;
}

// ---------- 1. Хянах самбар ----------
async function renderMobileDashboard() {
  const body = document.getElementById('contentBody');
  body.innerHTML = '<div class="pool-empty">Ачаалж байна...</div>';
  const now = new Date();
  const curMonth = now.getMonth() + 1, curYear = now.getFullYear();

  const [residentsRes, businessesRes, txThisMonthRes, txYearRes, mvRes, lastTxRes] = await Promise.all([
    sb.from('residents').select('*'),
    sb.from('businesses').select('*'),
    sb.from('transactions').select('amount,type').eq('month', curMonth).eq('year', curYear),
    sb.from('transactions').select('amount,type,month,year').eq('year', curYear),
    sb.from('market_valuations').select('*').order('year', { ascending: true }).order('month', { ascending: true }).limit(24),
    sb.from('transactions').select('*').eq('type', 'income').order('id', { ascending: false }).limit(5),
  ]);
  const residentsData = residentsRes.data || [], businessesData = businessesRes.data || [];

  // ---- 1. Энэ сард нэхэмжилсэн / Энэ сарын орлого ----
  const billedThisMonth = residentsData.reduce((s, r) => s + calcFeeU(residentSqmU(r)), 0)
    + businessesData.reduce((s, b) => s + computeBizFeeU(b), 0);
  const monthIncome = (txThisMonthRes.data || []).filter(t => t.type === 'income').reduce((s, t) => s + (+t.amount || 0), 0);

  // ---- 2. Нийт өр авлага + Төлбөр төлөлтийн явц ----
  const txAll = await sb.from('transactions').select('apt,businessId:business_id,month,year,type').eq('type', 'income');
  const paidMonthsByApt = {}, paidMonthsByBiz = {};
  (txAll.data || []).forEach(t => {
    if (t.year !== curYear) return;
    if (t.apt) { (paidMonthsByApt[t.apt] ||= new Set()).add(t.month); }
    if (t.businessId) { (paidMonthsByBiz[t.businessId] ||= new Set()).add(t.month); }
  });
  let totalDebt = 0, cPaid = 0, cPending = 0, cOverdue = 0, cRisk = 0, cTotal = 0;
  residentsData.forEach(r => {
    cTotal++;
    const paidSet = paidMonthsByApt[r.apt] || new Set();
    const debt = computeResidentDebtU(r, curMonth, curYear, paidSet);
    totalDebt += debt;
    const mu = debt > 0 ? Math.ceil(debt / (calcFeeU(residentSqmU(r)) || 1)) : 0;
    if (mu === 0) cPaid++; else if (mu < (feeSettings.overdueMonths || 2)) cPending++;
    else if (mu < (feeSettings.riskMonths || 12)) cOverdue++; else cRisk++;
  });
  businessesData.forEach(b => {
    if (!(computeBizFeeU(b) > 0)) return;
    cTotal++;
    const paidSet = paidMonthsByBiz[b.id] || new Set();
    const debt = computeBusinessDebtU(b, curMonth, curYear, paidSet);
    totalDebt += debt;
    const fee = computeBizFeeU(b) || 1;
    const mu = debt > 0 ? Math.ceil(debt / fee) : 0;
    if (mu === 0) cPaid++; else if (mu < (rentSettings.overdueMonths || 2)) cPending++;
    else if (mu < (rentSettings.riskMonths || 12)) cOverdue++; else cRisk++;
  });

  // ---- 3. Жилийн орлого/зарлагын чарт (сар бүрээр) ----
  const incomeByMonth = Array(12).fill(0), expenseByMonth = Array(12).fill(0);
  (txYearRes.data || []).forEach(t => {
    const idx = (t.month || 1) - 1; if (idx < 0 || idx > 11) return;
    if (t.type === 'income') incomeByMonth[idx] += (+t.amount || 0);
    else expenseByMonth[idx] += (+t.amount || 0);
  });

  // ---- 4. Хотхоны зах зээлийн үнэлгээ ----
  const mvRows = mvRes.data || [];
  const mvLast = mvRows[mvRows.length - 1], mvPrev = mvRows[mvRows.length - 2];
  const mvDelta = (mvLast && mvPrev && mvPrev.apartment_sale) ? ((mvLast.apartment_sale - mvPrev.apartment_sale) / mvPrev.apartment_sale * 100) : null;

  let html = `
    <div class="mobile-stat-grid">
      <div class="mobile-stat-card"><div class="mobile-stat-value">${billedThisMonth.toLocaleString()}₮</div><div class="mobile-stat-label">Энэ сард нэхэмжилсэн</div></div>
      <div class="mobile-stat-card"><div class="mobile-stat-value">${monthIncome.toLocaleString()}₮</div><div class="mobile-stat-label">Энэ сарын орлого</div></div>
      <div class="mobile-stat-card" style="grid-column:span 2"><div class="mobile-stat-value" style="color:${totalDebt > 0 ? 'var(--danger)' : 'var(--ink)'}">${totalDebt.toLocaleString()}₮</div><div class="mobile-stat-label">Нийт өр авлага</div></div>
    </div>`;

  // Хотхоны үнэлгээ
  if (mvLast) {
    html += `<div style="font-size:13px;font-weight:700;margin:18px 0 8px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em">Хотхоны үнэлгээ</div>`;
    html += `<div class="mobile-list-item" style="cursor:default">
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px">
        <div><div class="mobile-list-title" style="font-size:18px">${(+mvLast.apartment_sale || 0).toLocaleString()}₮<span style="font-size:11px;color:var(--text-secondary)">/м²</span></div>
        <div class="mobile-list-sub">Орон сууцны дундаж зарах үнэ</div></div>
        ${mvDelta !== null ? `<div style="font-size:12px;font-weight:700;color:${mvDelta >= 0 ? 'var(--ok)' : 'var(--danger)'}">${mvDelta >= 0 ? '▲' : '▼'} ${Math.abs(mvDelta).toFixed(1)}%</div>` : ''}
      </div>
      ${sparklineSvg(mvRows.map(r => +r.apartment_sale || 0), '#3FCFB4', 340, 40)}
    </div>`;
  }

  // Жилийн орлого/зарлага
  html += `<div style="font-size:13px;font-weight:700;margin:18px 0 8px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em">${curYear} оны орлого / зарлага</div>`;
  html += `<div class="mobile-list-item" style="cursor:default">
    <div style="display:flex;gap:14px;font-size:11px;color:var(--text-secondary);margin-bottom:8px">
      <span>🟢 Орлого</span><span>🔵 Зарлага</span>
    </div>
    ${barChartSvg(incomeByMonth, expenseByMonth, incomeByMonth, 340, 70)}
  </div>`;

  // Төлбөр төлөлтийн явц
  html += `<div style="font-size:13px;font-weight:700;margin:18px 0 8px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em">Төлбөр төлөлтийн явц (${cTotal})</div>`;
  html += `<div class="ledger-list-wrap" style="background:var(--glass-fill);border:1px solid var(--glass-border-soft);border-radius:14px;padding:4px 16px;backdrop-filter:blur(20px)">
    <div class="mobile-list-item" style="border:none;background:none;padding:10px 0;margin:0;cursor:default;display:flex;justify-content:space-between"><span style="color:var(--ok)">Төлсөн</span><b>${cPaid}</b></div>
    <div class="mobile-list-item" style="border:none;background:none;padding:10px 0;margin:0;cursor:default;display:flex;justify-content:space-between;border-top:1px solid rgba(255,255,255,0.08)"><span>Хүлээлттэй</span><b>${cPending}</b></div>
    <div class="mobile-list-item" style="border:none;background:none;padding:10px 0;margin:0;cursor:default;display:flex;justify-content:space-between;border-top:1px solid rgba(255,255,255,0.08)"><span style="color:#E0A356">Хугацаа хэтэрсэн</span><b>${cOverdue}</b></div>
    <div class="mobile-list-item" style="border:none;background:none;padding:10px 0;margin:0;cursor:default;display:flex;justify-content:space-between;border-top:1px solid rgba(255,255,255,0.08)"><span style="color:#D9765C">Эрсдэлтэй</span><b>${cRisk}</b></div>
  </div>`;

  // 4 зах зээлийн үнэлгээний жижиг чарт
  if (mvRows.length) {
    const mvCharts = [
      { label: 'Орон сууц (₮/м²)', field: 'apartment_sale', color: '#3FCFB4' },
      { label: 'Түрээс, 1 өрөө (₮/сар)', field: 'rent_1room', color: '#F2C94C' },
      { label: 'Зогсоол зарах (₮)', field: 'parking_sale', color: '#9B8FB0' },
      { label: 'Агуулах түрээс (₮/сар)', field: 'storage_rent', color: '#E0A356' },
    ];
    html += `<div style="font-size:13px;font-weight:700;margin:18px 0 8px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em">Хотхоны зах зээлийн чиг хандлага</div>`;
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">`;
    mvCharts.forEach(c => {
      const vals = mvRows.map(r => +r[c.field] || 0);
      const lastVal = vals[vals.length - 1] || 0;
      html += `<div class="mobile-list-item" style="cursor:default;padding:12px">
        <div style="font-size:10.5px;color:var(--text-secondary);margin-bottom:2px">${c.label}</div>
        <div style="font-size:13px;font-weight:700;margin-bottom:6px">${lastVal.toLocaleString()}₮</div>
        ${sparklineSvg(vals, c.color, 150, 28)}
      </div>`;
    });
    html += `</div>`;
  }

  // Сууц өмчлөгчид зориулж, ӨӨРИЙНХ НЬ мэдээлэл
  if (currentProfile.role === 'ot' && currentProfile.apt) {
    const myRes = residentsData.find(r => String(r.apt) === String(currentProfile.apt));
    const { data: myTx } = await sb.from('transactions').select('*').eq('apt', currentProfile.apt).eq('type', 'income').order('id', { ascending: false }).limit(1);
    const lastPay = myTx && myTx[0];
    html += `
      <div style="font-size:13px;font-weight:700;margin:18px 0 8px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em">Миний мэдээлэл</div>
      <div class="mobile-list-item" style="cursor:default">
        <div class="mobile-list-title">${escUserHtml(currentProfile.apt)} тоот${myRes ? ' · ' + residentSqmU(myRes) + ' м²' : ''}</div>
        <div class="mobile-list-sub">${lastPay ? 'Сүүлийн төлбөр: ' + (+lastPay.amount).toLocaleString() + '₮ (' + lastPay.month + '-р сар, ' + lastPay.year + ')' : 'Төлбөрийн түүх алга'}</div>
      </div>`;
  }

  if (lastTxRes.data && lastTxRes.data.length) {
    html += `<div style="font-size:13px;font-weight:700;margin:18px 0 8px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em">Сүүлийн гүйлгээ</div>`;
    html += lastTxRes.data.map(t => `
      <div class="mobile-list-item" style="cursor:default">
        <div class="mobile-list-title">${(+t.amount || 0).toLocaleString()}₮</div>
        <div class="mobile-list-sub">${escUserHtml(t.apt || t.description || '—')} · ${t.month}-р сар, ${t.year}</div>
      </div>`).join('');
  }

  body.innerHTML = html;
}

    if (q) {
      const { data: results } = await sb.rpc('get_poll_results', { p_question_id: q.id });
      if (results) total = results.reduce((s, r) => s + (+r.vote_count || 0), 0);
    }
    return `
      <div class="mobile-list-item" onclick="renderMobilePollDetail(${p.id})">
        <div class="mobile-list-title">${escUserHtml(p.title)}</div>
        <div class="mobile-list-sub">${total !== null ? total + ' хүн оролцсон · ' : ''}Дэлгэрэнгүй, санал өгөх →</div>
      </div>`;
  }));
  body.innerHTML = items.join('');
}
async function renderMobilePollDetail(pollId) {
  const body = document.getElementById('contentBody');
  body.innerHTML = '<div class="pool-empty">Ачаалж байна...</div>';
  const { data: poll } = await sb.from('polls').select('*').eq('id', pollId).maybeSingle();
  const { data: questions } = await sb.from('poll_questions').select('*').eq('poll_id', pollId).order('order_num');
  let alreadyVoted = false;
  if (currentProfile.role === 'ot' && currentProfile.apt) {
    const { data: myVotes } = await sb.from('votes').select('id').eq('poll_id', pollId).eq('apt', currentProfile.apt).limit(1);
    alreadyVoted = myVotes && myVotes.length > 0;
  }
  let html = `<div style="margin-bottom:14px"><button class="login-btn" style="width:auto;padding:8px 14px;font-size:13px" onclick="renderMobilePolls()">← Буцах</button></div>`;
  html += `<h2 style="font-size:18px;margin:0 0 14px">${escUserHtml(poll ? poll.title : '')}</h2>`;
  if (currentProfile.role !== 'ot') {
    html += `<div class="pool-empty">Санал өгөх боломж зөвхөн Сууц өмчлөгч ролид байна.</div>`;
    body.innerHTML = html; return;
  }
  if (alreadyVoted) {
    html += `<div style="font-size:13px;color:var(--text-secondary);margin-bottom:14px">Та энэ санал хураалтад аль хэдийн санал өгсөн байна ✓</div>`;
    // Миний өөрийн сонгосон option_id-үүд (RLS зөвшөөрдөг — зөвхөн өөрийнхөө)
    const { data: myVoteRows } = await sb.from('votes').select('option_id').eq('poll_id', pollId).eq('apt', currentProfile.apt);
    const myOptionIds = new Set((myVoteRows || []).map(v => v.option_id));
    for (const q of (questions || [])) {
      const { data: options } = await sb.from('poll_options').select('*').eq('question_id', q.id).order('order_num');
      // Нэр дэвшигчийн (election) хувьд тухайн хүний тоотыг residents-ээс олж хаяг болгож нэмнэ
      const residentIds = (options || []).map(o => o.resident_id).filter(Boolean);
      let aptById = {};
      if (residentIds.length) {
        const { data: resRows } = await sb.from('residents').select('id,apt').in('id', residentIds);
        (resRows || []).forEach(r => { aptById[r.id] = r.apt; });
      }
      const { data: results } = await sb.rpc('get_poll_results', { p_question_id: q.id });
      const countByOption = {};
      (results || []).forEach(r => { countByOption[r.option_id] = r.vote_count; });
      const total = Object.values(countByOption).reduce((s, n) => s + n, 0);
      html += `<div style="margin-bottom:18px"><div style="font-weight:700;font-size:14px;margin-bottom:8px">${escUserHtml(q.question_text || '')}</div>`;
      if (!results) {
        html += `<div style="font-size:12px;color:var(--text-secondary)">Үр дүн нэвтэрснээр эсвэл санал хураалт хаагдсаны дараа харагдана.</div>`;
      } else {
        (options || []).forEach(o => {
          const cnt = countByOption[o.id] || 0;
          const pct = total ? Math.round(cnt / total * 100) : 0;
          const isMine = myOptionIds.has(o.id);
          const aptTag = o.resident_id && aptById[o.resident_id] ? ` <span style="color:var(--text-secondary);font-weight:400">(${aptById[o.resident_id]} тоот)</span>` : '';
          html += `<div style="margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
              <span>${isMine ? '✓ ' : ''}${escUserHtml(o.option_text || '')}${aptTag}</span><span style="color:var(--text-secondary)">${cnt} (${pct}%)</span>
            </div>
            <div style="height:8px;border-radius:4px;background:rgba(255,255,255,0.12);overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${isMine ? 'var(--brass)' : 'var(--accent-teal)'}"></div>
            </div>
          </div>`;
        });
      }
      html += `</div>`;
    }
    body.innerHTML = html; return;
  }
  for (const q of (questions || [])) {
    const { data: options } = await sb.from('poll_options').select('*').eq('question_id', q.id).order('order_num');
    html += `<div style="margin-bottom:18px"><div style="font-weight:700;font-size:14px;margin-bottom:8px">${escUserHtml(q.question_text || '')}</div>`;
    html += `<div class="mobile-vote-options" data-question="${q.id}">`;
    (options || []).forEach(o => {
      html += `<button class="mobile-vote-btn" data-question="${q.id}" data-option="${o.id}" onclick="toggleMobileVoteOption(this)">${escUserHtml(o.option_text || '')}</button>`;
    });
    html += `</div></div>`;
  }
  const qIds = JSON.stringify((questions || []).map(q => q.id));
  html += `<button class="login-btn" onclick='submitMobileVote(${pollId}, ${qIds}, ${JSON.stringify(poll ? poll.poll_type : '')})'>Санал өгөх</button>`;
  html += `<div id="mobileVoteError" class="login-error"></div>`;
  body.innerHTML = html;
}
function toggleMobileVoteOption(btn) {
  // Нэг асуултад ганц сонголт (mobile хувилбарын хялбарчилсан дүрэм — олон сонголттой
  // сонгуулийн санал хураалтад ч энгийн байдлаар зөвхөн 1-ийг л зөвшөөрнө).
  document.querySelectorAll(`.mobile-vote-btn[data-question="${btn.dataset.question}"]`).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}
async function submitMobileVote(pollId, questionIds, pollType) {
  const errEl = document.getElementById('mobileVoteError');
  const { data: myResident } = await sb.from('residents').select('id').eq('apt', currentProfile.apt).maybeSingle();
  if (!myResident) { if (errEl) errEl.textContent = 'Таны тоотод харгалзах бүртгэл олдсонгүй'; return; }
  const rows = [];
  questionIds.forEach(qId => {
    const selectedBtn = document.querySelector(`.mobile-vote-btn[data-question="${qId}"].selected`);
    if (selectedBtn) rows.push({ poll_id: pollId, question_id: qId, option_id: +selectedBtn.dataset.option, resident_id: myResident.id, apt: currentProfile.apt, poll_type: pollType });
  });
  if (!rows.length) { if (errEl) errEl.textContent = 'Сонголт хийнэ үү'; return; }
  const { error } = await sb.from('votes').insert(rows);
  if (error) { if (errEl) errEl.textContent = error.code === '23505' ? 'Та аль хэдийн санал өгсөн байна' : 'Алдаа: ' + error.message; return; }
  await renderMobilePollDetail(pollId);
}

// ============================================================
// PULL-TO-REFRESH — PWA (Add to Home Screen) горимд browser-ийн refresh
// байдаггүй тул, дэлгэцийг доош чирэхэд өгөгдлийг дахин ачаалдаг гар аргын
// хэрэгжүүлэлт. Идэвхтэй харагдаж буй view-г (Нүүр tile эсвэл нээлттэй модуль)
// тодорхойлж, зөвхөн тэрийг л шинэчилнэ.
// ============================================================
(function setupPullToRefresh() {
  const THRESHOLD = 68;
  const indicator = document.getElementById('pullRefreshIndicator');
  let startY = 0, pulling = false, dist = 0;

  function scrollTopOfActiveView() {
    const contentPage = document.getElementById('contentPage');
    if (contentPage && contentPage.classList.contains('open')) {
      return document.getElementById('contentBody').scrollTop;
    }
    return window.scrollY || document.documentElement.scrollTop;
  }

  document.addEventListener('touchstart', (e) => {
    if (document.getElementById('loginOverlay').style.display !== 'none') return; // Нэвтрээгүй үед идэвхгүй
    if (scrollTopOfActiveView() > 0) return;
    startY = e.touches[0].clientY;
    pulling = true; dist = 0;
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (!pulling) return;
    dist = e.touches[0].clientY - startY;
    if (dist > 0 && scrollTopOfActiveView() <= 0) {
      indicator.style.height = Math.min(dist * 0.5, 56) + 'px';
    }
  }, { passive: true });

  document.addEventListener('touchend', async () => {
    if (!pulling) return;
    pulling = false;
    if (dist > THRESHOLD) {
      indicator.classList.add('loading');
      indicator.style.height = '48px';
      await refreshActiveView();
    }
    indicator.classList.remove('loading');
    indicator.style.height = '0';
    dist = 0;
  });

  async function refreshActiveView() {
    const contentPage = document.getElementById('contentPage');
    if (contentPage && contentPage.classList.contains('open') && currentOpenPageKey) {
      await openModulePage(currentOpenPageKey);
    } else if (currentUser) {
      await loadReferenceData();
      await buildModuleTiles();
    }
  }
})();

// ============================================================
// "НУУСАН ТОВЧОО СЭРГЭЭХ" — зөвхөн ЭРХТЭЙ ч хувийн шалтгаанаар нуусан
// tile-уудыг л жагсаана (шинэ эрх нэмдэггүй, зөвхөн ХАРАГДАЦЫГ сэргээнэ).
// ============================================================
function openAddModal() {
  renderPoolList();
  document.getElementById('addModalOverlay').classList.add('open');
}
function closeAddModal() {
  document.getElementById('addModalOverlay').classList.remove('open');
}
function renderPoolList() {
  const el = document.getElementById('poolList');
  if (!TILE_POOL.length) { el.innerHTML = '<div class="pool-empty">Нуусан товч алга</div>'; return; }
  el.innerHTML = TILE_POOL.map((t, idx) => `
    <div class="pool-item">
      <div class="tile-icon-badge badge-teal">${ICON_LOCK_OPEN}</div>
      <div class="pool-label">${t.label}</div>
      <button class="pool-add-btn" onclick="addFromPool(${idx})">+</button>
    </div>`).join('');
}
function addFromPool(idx) {
  const [restored] = TILE_POOL.splice(idx, 1);
  if (restored.page) {
    const hidden = getHiddenTileKeys();
    hidden.delete(restored.page);
    saveHiddenTileKeys(hidden);
  }
  ACTIVE_TILES.push(restored);
  renderPoolList();
  renderTiles();
}

checkExistingUserSession();
